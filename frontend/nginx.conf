server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large document uploads (PDFs/DOCX) site-wide
    client_max_body_size 100M;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";

    # Hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        # index.html must never be cached, or browsers keep loading an old
        # build that references stale (now-removed) JS bundle hashes.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy API requests to backend over the internal docker network
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stream NDJSON progress to the client without buffering, and allow
        # long-running FAQ extraction (many chunks) without timing out.
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 100M;

        # nginx consumes the upstream X-Accel-Buffering header for its own
        # buffering and does NOT forward it. Re-emit it so an outer proxy
        # (Nginx Proxy Manager) also streams live instead of buffering.
        add_header X-Accel-Buffering no always;
        # Never gzip the stream — gzip would buffer events to compress them.
        gzip off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
