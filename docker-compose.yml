services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sar_api_qdrant
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - ./backend/qdrant_storage:/qdrant/storage
    restart: always

  backend:
    build: ./backend
    container_name: sar_api_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - PORT=8000
      - REGISTRY_PATH=/app/data/collections_registry.json
    volumes:
      # Persist the collection registry and CSV exports across container rebuilds.
      - ./backend/data:/app/data
      - ./backend/exports:/app/exports
    depends_on:
      - qdrant
    restart: always

  frontend:
    build: ./frontend
    container_name: sar_api_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
